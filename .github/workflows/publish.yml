name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Verify crate version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$VER" ]; then
            echo "Tag $TAG does not match Cargo.toml version $VER"
            exit 1
          fi

      - name: Check if version already published
        id: version_check
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if curl -fsSL "https://crates.io/api/v1/crates/akira-billing/$VER" >/dev/null 2>&1; then
            echo "Already published: akira-billing@$VER"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to crates.io via Trusted Publishing
        if: steps.version_check.outputs.skip != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        if: steps.version_check.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --no-verify

      - name: Extract release notes for this version
        id: notes
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$VER" '
            /^## \[/ {
              if (capture) exit
              if (index($0, "[" ver "]")) { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md." > release-notes.md
          fi

      - name: Create GitHub Release
        if: steps.version_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi
